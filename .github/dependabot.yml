version: 2

updates:
  - package-ecosystem: npm
    directory: /docs~
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      include:
        - "*"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@mdx-js/react"
      npm-tooling:
        patterns:
          - "clsx"
          - "prism-react-renderer"
          - "serialize-javascript"
    labels:
      - dependencies
      - npm
      - documentation
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      include:
        - "*"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
